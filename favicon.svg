<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" width="340" height="72" role="img" aria-label="ClaudeTrader">
  <!-- Icon background -->
  <rect x="0" y="4" width="64" height="64" rx="12" fill="#0b3d91"/>
  <!-- Candlestick 1 (bearish, small) -->
  <line x1="14" y1="28" x2="14" y2="22" stroke="#e05555" stroke-width="1.8"/>
  <rect x="10" y="32" width="8" height="14" rx="1.5" fill="#e05555"/>
  <line x1="14" y1="46" x2="14" y2="50" stroke="#e05555" stroke-width="1.8"/>
  <!-- Candlestick 2 (bullish) -->
  <line x1="27" y1="20" x2="27" y2="14" stroke="#f0a500" stroke-width="1.8"/>
  <rect x="23" y="24" width="8" height="16" rx="1.5" fill="#f0a500"/>
  <line x1="27" y1="40" x2="27" y2="45" stroke="#f0a500" stroke-width="1.8"/>
  <!-- Candlestick 3 (bullish, tall) -->
  <line x1="40" y1="14" x2="40" y2="8" stroke="#f0a500" stroke-width="1.8"/>
  <rect x="36" y="18" width="8" height="20" rx="1.5" fill="#f0a500"/>
  <line x1="40" y1="38" x2="40" y2="44" stroke="#f0a500" stroke-width="1.8"/>
  <!-- Upward arrow -->
  <polyline points="46,22 54,14 58,18" fill="none" stroke="#ffffff"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="54" y1="14" x2="54" y2="22" stroke="#ffffff" stroke-width="2.5"
        stroke-linecap="round"/>
  <!-- Brand name -->
  <text x="80" y="42" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="28" font-weight="800" fill="#0b3d91" letter-spacing="-0.5">ClaudeTrader</text>
  <!-- Tagline -->
  <text x="82" y="60" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="11" font-weight="600" fill="#f0a500" letter-spacing="3">STOCK SCANNER</text>
</svg>
