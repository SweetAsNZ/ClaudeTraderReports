<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="ClaudeTrader icon">
  <!-- Icon background: vivid royal-blue rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#1e4ec9"/>
  <!-- Candlestick 1 (bearish, red) -->
  <line x1="15" y1="44" x2="15" y2="52" stroke="#e23b3b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="15" y1="18" x2="15" y2="26" stroke="#e23b3b" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="11" y="26" width="8" height="18" rx="2" fill="#e23b3b"/>
  <!-- Candlestick 2 (bullish, amber) -->
  <line x1="28" y1="40" x2="28" y2="47" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="28" y2="23" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="24" y="23" width="8" height="17" rx="2" fill="#f5a623"/>
  <!-- Candlestick 3 (bullish, amber, tall) -->
  <line x1="41" y1="38" x2="41" y2="45" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="41" y1="12" x2="41" y2="19" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="37" y="19" width="8" height="19" rx="2" fill="#f5a623"/>
  <!-- Bold white up-arrow (top-right) -->
  <g fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="52" y1="34" x2="52" y2="14"/>
    <polyline points="45,21 52,13 59,21"/>
  </g>
</svg>
