<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 72" width="340" height="72" role="img" aria-label="ClaudeTrader">
  <!-- Icon background: vivid royal-blue rounded square -->
  <rect x="0" y="4" width="64" height="64" rx="14" fill="#1e4ec9"/>
  <!-- Candlestick 1 (bearish, red) -->
  <line x1="15" y1="46" x2="15" y2="54" stroke="#e23b3b" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="15" y1="22" x2="15" y2="30" stroke="#e23b3b" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="11" y="30" width="8" height="16" rx="2" fill="#e23b3b"/>
  <!-- Candlestick 2 (bullish, amber) -->
  <line x1="28" y1="42" x2="28" y2="49" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="28" y1="20" x2="28" y2="27" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="24" y="27" width="8" height="15" rx="2" fill="#f5a623"/>
  <!-- Candlestick 3 (bullish, amber, tall) -->
  <line x1="41" y1="40" x2="41" y2="47" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="41" y1="14" x2="41" y2="21" stroke="#f5a623" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="37" y="21" width="8" height="19" rx="2" fill="#f5a623"/>
  <!-- Bold white up-arrow (top-right) -->
  <g fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <line x1="52" y1="34" x2="52" y2="14"/>
    <polyline points="45,21 52,13 59,21"/>
  </g>
  <!-- Brand name -->
  <text x="80" y="42" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="28" font-weight="800" fill="#1e4ec9" letter-spacing="-0.5">ClaudeTrader</text>
  <!-- Tagline -->
  <text x="82" y="60" font-family="-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif"
        font-size="11" font-weight="600" fill="#f5a623" letter-spacing="3">STOCK SCANNER</text>
</svg>
